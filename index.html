<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counterfat - Teman Diet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff; /* Latar belakang putih */
            color: #111111; /* Teks hitam */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            padding: 40px 20px;
            width: 100%;
            max-width: 420px;
        }
        .product-image {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 25px;
            border: 5px solid #FFD700; /* Aksen kuning keemasan */
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        h2 {
            font-size: 16px;
            font-weight: 400;
            color: #666;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: 2px solid #111;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-shopee {
            background-color: #111111;
            color: #FFD700;
        }
        .btn-tokopedia {
            background-color: #ffffff;
            color: #111111;
        }
        .btn-tokopedia:hover {
            background-color: #f8f8f8;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/180/000000/FFD700?text=Logo+Counterfat" alt="Counterfat Cuka Apel" class="product-image">
        
        <h1>Counterfat</h1>
        <h2>Teman Diet Anda</h2>
        
        <a href="LINK_SHOPEE_ANDA" class="btn btn-shopee" target="_blank">Pesan via Shopee</a>
        
        <a href="LINK_TOKOPEDIA_ANDA" class="btn btn-tokopedia" target="_blank">Pesan via Tokopedia</a>
    </div>

</body>
</html>
